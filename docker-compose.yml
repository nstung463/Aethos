services:
  postgres:
    image: postgres:16-alpine
    container_name: aethos-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aethos}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - aethos-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-aethos}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - aethos-network

  aethos-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aethos-backend
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      AETHOS_PROVIDER: ${AETHOS_PROVIDER:-openrouter}
      AETHOS_MODEL: ${AETHOS_MODEL:-openai/gpt-4o-mini}
      AETHOS_WORKSPACE: /app/workspace
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DAYTONA_API_KEY: ${DAYTONA_API_KEY:-}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      AETHOS_DATABASE_ENABLED: ${AETHOS_DATABASE_ENABLED:-true}
      AETHOS_DATABASE_URL: ${AETHOS_DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/aethos}
      AETHOS_DATABASE_AUTO_MIGRATE: ${AETHOS_DATABASE_AUTO_MIGRATE:-true}
      AETHOS_AUTH_REPOSITORY_BACKEND: ${AETHOS_AUTH_REPOSITORY_BACKEND:-postgres}
    volumes:
      - ./workspace:/app/workspace
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/v1/models')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - aethos-network

  aethos-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
    container_name: aethos-frontend
    depends_on:
      aethos-backend:
        condition: service_healthy
    ports:
      - "3000:80"
    restart: unless-stopped
    networks:
      - aethos-network

networks:
  aethos-network:
    driver: bridge

volumes:
  aethos-postgres-data:
