services:
  aethos-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aethos-backend
    ports:
      - "8080:8080"
    environment:
      AETHOS_PROVIDER: ${AETHOS_PROVIDER:-openrouter}
      AETHOS_MODEL: ${AETHOS_MODEL:-openai/gpt-4o-mini}
      AETHOS_WORKSPACE: /app/workspace
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DAYTONA_API_KEY: ${DAYTONA_API_KEY:-}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./workspace:/app/workspace
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/v1/models')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - aethos-network

  aethos-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
    container_name: aethos-frontend
    depends_on:
      aethos-backend:
        condition: service_healthy
    ports:
      - "3000:80"
    restart: unless-stopped
    networks:
      - aethos-network

networks:
  aethos-network:
    driver: bridge
